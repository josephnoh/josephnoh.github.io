name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'  # 09:00 KST daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fetch GitHub Stats via GraphQL
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Fetch contribution data (includes private repos)
          QUERY='{
            "query": "query { viewer { login repositories(privacy: PUBLIC) { totalCount } contributionsCollection { contributionCalendar { totalContributions weeks { contributionDays { contributionCount date } } } } } }"
          }'

          RESPONSE=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$QUERY" \
            https://api.github.com/graphql)

          echo "$RESPONSE" | python3 -c "
          import json, sys
          from datetime import datetime, timedelta

          data = json.load(sys.stdin)
          viewer = data['data']['viewer']
          calendar = viewer['contributionsCollection']['contributionCalendar']

          total = calendar['totalContributions']
          repos = viewer['repositories']['totalCount']

          # Build flat contributions list
          contributions = []
          for week in calendar['weeks']:
              for day in week['contributionDays']:
                  contributions.append({
                      'date': day['date'],
                      'count': day['contributionCount']
                  })

          # Calculate streaks
          sorted_days = sorted(contributions, key=lambda x: x['date'], reverse=True)
          current_streak = 0
          longest_streak = 0
          streak = 0

          # Current streak: count from today backwards
          today = datetime.now().strftime('%Y-%m-%d')
          yesterday = (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d')

          for day in sorted_days:
              if day['date'] > today:
                  continue
              if current_streak == 0 and day['count'] == 0 and day['date'] == today:
                  continue  # today might not be over yet, check yesterday
              if day['count'] > 0:
                  current_streak += 1
              else:
                  break

          # Longest streak
          for day in sorted(contributions, key=lambda x: x['date']):
              if day['count'] > 0:
                  streak += 1
                  longest_streak = max(longest_streak, streak)
              else:
                  streak = 0

          result = {
              'totalContributions': total,
              'totalRepos': repos,
              'currentStreak': current_streak,
              'longestStreak': longest_streak,
              'contributions': contributions,
              'updatedAt': datetime.now().strftime('%Y-%m-%d')
          }

          with open('github-stats.json', 'w') as f:
              json.dump(result, f, indent=2)
          print(f'Updated: {total} contributions, {repos} repos, streak: {current_streak}d')
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update GitHub stats $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
      - run: git pull origin main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
